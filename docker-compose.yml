version: "3.9"

services:
  # -------------------------------------------------------------------------
  # PostgreSQL — CDP metadata store (segments, brands, users)
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cdp
      POSTGRES_PASSWORD: cdp
      POSTGRES_DB: cdp_meta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis — caching (audience counts, session, rate limiting)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Backend — FastAPI CDP Platform
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CDP_DATABASE_URL: postgresql+asyncpg://cdp:cdp@postgres:5432/cdp_meta
      CDP_REDIS_URL: redis://redis:6379/0
      CDP_DEBUG: "true"
      CDP_AWS_REGION: ap-south-1
      # AWS credentials injected via env or IAM role
      # CDP_AWS_ACCESS_KEY_ID: ...
      # CDP_AWS_SECRET_ACCESS_KEY: ...
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # -------------------------------------------------------------------------
  # Frontend — React Segment Builder UI
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:

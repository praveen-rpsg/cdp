version: "3.9"

services:
  # -------------------------------------------------------------------------
  # Redis — caching (audience counts, session, rate limiting)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"

  # -------------------------------------------------------------------------
  # Backend — FastAPI CDP Platform
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CDP_DATABASE_URL: postgresql+asyncpg://postgres:Raghav_1174@host.docker.internal:5432/cdp_meta
      CDP_REDIS_URL: redis://redis:6379/0
      CDP_DEBUG: "true"
      CDP_AWS_REGION: ap-south-1
      # Spencer's DWH connection (same PG instance, used by PgCompiler)
      PG_HOST: host.docker.internal
      PG_PORT: "5432"
      PG_DB: cdp_meta
      PG_USER: postgres
      PG_PASSWORD: Raghav_1174
      # AWS credentials injected via env or IAM role
      # CDP_AWS_ACCESS_KEY_ID: ...
      # CDP_AWS_SECRET_ACCESS_KEY: ...
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # -------------------------------------------------------------------------
  # Frontend — React Segment Builder UI
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # -------------------------------------------------------------------------
  # dbt — Transformations (identity resolution, silver/gold layers)
  # -------------------------------------------------------------------------
  dbt:
    build:
      context: ./dwh/dbt_spencers
      dockerfile: Dockerfile
    environment:
      PG_HOST: host.docker.internal
      PG_PORT: "5432"
      PG_USER: postgres
      PG_PASSWORD: Raghav_1174
      PG_DB: cdp_meta
    depends_on: []
    volumes:
      - ./dwh/dbt_spencers:/dbt
    profiles:
      - dbt

volumes: {}
